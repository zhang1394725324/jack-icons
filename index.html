<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG 图标 & 特殊符号大全</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>目录</h2>
            <ul>
                <li><a href="#" id="show-svg">SVG 图标库</a></li>
                <li><a href="#" id="show-symbols">特殊符号大全</a></li>
            </ul>
        </aside>
        <main class="content">
            <div id="svg-icons-section" class="section active">
                <h1>SVG 图标库</h1>
                <div id="svg-icons-grid" class="grid-container">
                    <!-- SVG 图标将在这里加载 -->
                </div>
            </div>
            <div id="special-symbols-section" class="section">
                <h1>特殊符号大全</h1>
                <div id="special-symbols-grid" class="grid-container">
                    <!-- 特殊符号将在这里加载 -->
                </div>
            </div>
        </main>
    </div>

    <div id="copy-success-popup" class="popup">
        已复制到剪贴板！
    </div>

    <script src="script.js"></script>
</body>
</html>
